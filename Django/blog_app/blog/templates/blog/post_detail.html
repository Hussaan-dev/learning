<!DOCTYPE html>
<html>
    <body>
        <h2>{{ post.title }}</h2>
        <p>{{ post.content }}</p>
        <hr>
        <a href="{% url 'edit_post' post.id %}">
            <button>Edit</button>
        </a>
        <hr>
        <form method="post" action="{% url 'delete_post' post.id %}">
            {% csrf_token %}
            <button type="submit">Delete</button>
        </form>
    </body>
</html>
