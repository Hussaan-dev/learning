<!DOCTYPE html>
<html>
    <head>
        <style>
    body {
        font-family: Arial;
        background: #f5f5f5;
        text-align: center;
        margin: 0;
        padding: 50px;
    }

    h2 {
        background: white;
        display: inline-block;
        padding: 15px;
        border: 1px solid #ddd;
        border-radius: 6px;
    }

    form {
        margin-top: 20px;
    }

    button {
        padding: 8px 12px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        margin: 5px;
    }

    /* Yes delete button */
    form button {
        background: red;
        color: white;
    }

    form button:hover {
        background: darkred;
    }

    /* Cancel button */
    a button {
        background: gray;
        color: white;
    }

    a button:hover {
        background: #555;
    }
</style>
    </head>
    <body>
        <h2>Are you sure you want to delete task "{{ task.title }}"</h2>
        <form method="post">
            {% csrf_token %}
            <button type="submit">Yes, delete</button>
        </form>
        <br>
        <a href="{% url 'home' %}">
            <button>No, cancel</button>
        </a>
    </body>
</html>
